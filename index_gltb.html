<!doctype HTML>

<html>
<!--Muss mit LiveServer geoeffnet werden-->
<!--Hinweis: Der Preset-Marker Hiro (https://stemkoski.github.io/AR-Examples/markers/hiro.png) wird benoetigt und die Datei: https://github.khronos.org/glTF-Assets/model/DiffuseTransmissionPlant-->

<head>
  <script src="https://aframe.io/releases/0.9.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/jeromeetienne/AR.js/2.0.5/aframe/build/aframe-ar.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
</head>

<body style='margin: 0px; overflow: scroll;'>

  <a-scene embedded arjs>
      <a-marker preset="hiro">
          <a-entity
              gltf-model="url(DiffuseTransmissionPlant.glb)" 
              position="0 0 0"
              rotation="-90 0 0"
              scale="2 2 2"
              animation-mixer>
          </a-entity>
      </a-marker>

      <a-entity camera></a-entity>
  </a-scene>


</body>

</html>
